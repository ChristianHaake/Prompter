<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="theme-color" content="#245dcc" />
    <meta name="description" content="Teleprompter-App ohne Login und ohne Upload." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompter</title>
  </head>
  <body>
    <a class="skip-link" href="#app">Zum Inhalt springen</a>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="/">
          <img src="/logo.png" alt="Prompter Logo" class="brand__logo" />
          <span class="brand__text">
            <strong>Prompter</strong>
            <small data-i18n="app.tagline">Werkstatt für digitale Formate</small>
          </span>
        </a>
        <div class="header-meta">
          <span class="privacy-badge">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span data-i18n="app.privacyBadge">Inhalte bleiben lokal</span>
          </span>
          <div class="language-toggle" aria-label="Sprache">
            <button id="lang-switch-btn" class="language-toggle__button" title="Sprache wechseln" aria-label="Sprache wechseln" type="button">
              <span id="lang-current" class="language-toggle__active">DE</span>
              <span id="lang-target" class="language-toggle__inactive">EN</span>
            </button>
          </div>
          <a href="#/fuer-lehrkraefte" class="header-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-graduation-cap"><path d="M21.42 10.922a2 2 0 0 1-.019 3.022l-7.1 7.1a2 2 0 0 1-2.827 0l-7.1-7.1a2 2 0 0 1-.018-3.022L12 2.8z"></path><path d="m22 10-2.5 2.5"></path><path d="m2 10 2.5 2.5"></path><path d="m14 14.5-2 2-2-2"></path></svg>
            <span data-i18n="nav.teachers">Für Lehrkräfte</span>
          </a>
        </div>
      </header>

      <div class="education-notice" id="education-notice">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-graduation-cap"><path d="M21.42 10.922a2 2 0 0 1-.019 3.022l-7.1 7.1a2 2 0 0 1-2.827 0l-7.1-7.1a2 2 0 0 1-.018-3.022L12 2.8z"></path><path d="m22 10-2.5 2.5"></path><path d="m2 10 2.5 2.5"></path><path d="m14 14.5-2 2-2-2"></path></svg>
        <p data-i18n="app.educationNotice">Diese Simulation dient ausschließlich dem Bildungszweck.</p>
      </div>

      <main id="app" class="main-workspace">
        <!-- Main application / content mounts here -->
      </main>

      <footer class="app-footer">
        <nav class="footer-nav" aria-label="Rechtliches und Hilfe">
          <a href="#/hilfe" data-i18n="nav.help">Hilfe</a>
          <a href="#/ueber" data-i18n="nav.about">Über</a>
          <a href="#/datenschutz" data-i18n="nav.privacy">Datenschutz</a>
          <a href="#/impressum" data-i18n="nav.imprint">Impressum</a>
        </nav>
        <div class="footer-external">
          <a class="support-link" href="https://buymeacoffee.com/haak3" target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 2v2"></path>
              <path d="M14 2v2"></path>
              <path d="M6 8h12v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6Z"></path>
              <path d="M18 9h1a3 3 0 0 1 0 6h-1"></path>
              <path d="M4 22h16"></path>
            </svg>
            <span>Buy me a coffee</span>
          </a>
          <a class="github-link" href="https://github.com/ChristianHaake/Prompter" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24">
              <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C17.9 4.8 19 5.1 19 5.1c.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.7c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z" />
            </svg>
            <span data-i18n="nav.github">GitHub</span>
          </a>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
